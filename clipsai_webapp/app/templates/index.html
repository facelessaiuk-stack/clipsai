<!doctype html>
<html>
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>ClipsAI Web</title>
	<link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
	<div class="container">
		<h1>ClipsAI</h1>
		<p>Upload an audio or video file to transcribe and auto-generate clips.</p>
		<form action="/upload" method="post" enctype="multipart/form-data">
			<label>Media file
				<input type="file" name="file" required accept="audio/*,video/*" />
			</label>
			<div class="row">
				<label>Model size
					<select name="model_size">
						<option value="">Auto</option>
						<option value="tiny">tiny (CPU)</option>
						<option value="base">base</option>
						<option value="small">small</option>
						<option value="medium">medium</option>
						<option value="large-v1">large-v1</option>
						<option value="large-v2">large-v2</option>
					</select>
				</label>
				<label>Language (ISO 639-1)
					<input type="text" name="language" placeholder="Auto" />
				</label>
			</div>
			<button type="submit">Process</button>
		</form>
	</div>
</body>
</html>
